services:
  # Monolithic FastAPI + Celery + Redis Web Service
  - type: web
    name: backend-devops-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: GROQ_API_KEY
        sync: false
